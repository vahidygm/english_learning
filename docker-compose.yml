version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: english_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      DB_DSN: "host=postgres user=postgres password=postgres dbname=english_learning port=5432 sslmode=disable"
      PORT: "8080"
      MEDIA_ROOT: "/app/storage"
      PUBLIC_MEDIA_URL: "http://localhost:8080/media"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - media_storage:/app/storage

  importer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_DSN: "host=postgres user=postgres password=postgres dbname=english_learning port=5432 sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./web/language_learning
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://backend:8080/api/v1"
    depends_on:
      - backend

volumes:
  pgdata:
  media_storage:
